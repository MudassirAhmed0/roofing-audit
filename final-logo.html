<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaning Audit — Final Logo Assets</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: system-ui, -apple-system, sans-serif; 
    background: #f4f4f5; 
    color: #18181b; 
    padding: 48px 32px; 
    max-width: 1200px; 
    margin: 0 auto; 
  }
  h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
  .subtitle { color: #52525b; font-size: 16px; margin-bottom: 48px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px; }
  .card { 
    padding: 48px; 
    border-radius: 20px; 
    border: 1px solid #e4e4e7; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    gap: 32px; 
  }
  
  .bg-white { background: #ffffff; }
  .bg-dark { background: #18181b; border-color: #3f3f46; }
  .bg-green { background: #059669; border-color: #047857; }
  
  .label-group { text-align: center; }
  .label { 
    font-size: 12px; 
    font-family: monospace; 
    font-weight: 600; 
    letter-spacing: 0.1em; 
    color: #71717a; 
    text-transform: uppercase; 
    margin-bottom: 4px; 
  }
  .desc { font-size: 14px; color: #52525b; }
  
  .bg-dark .label { color: #a1a1aa; }
  .bg-dark .desc { color: #a1a1aa; }
  
  .bg-green .label { color: #ecfdf5; opacity: 0.9; }
  .bg-green .desc { color: #ecfdf5; opacity: 0.8; }
  
  .nav-section { grid-column: 1 / -1; align-items: flex-start; padding: 32px; }
  .nav-preview-row { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; }
  
  .nav-preview { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 16px 24px; 
    border-radius: 12px; 
    font-weight: 800; 
    font-size: 20px; 
    letter-spacing: -0.02em; 
  }
  .nav-light { background: #ffffff; border: 1px solid #e4e4e7; color: #18181b; }
  .nav-dark { background: #18181b; color: #ffffff; }
</style>
</head>
<body>

<h1>Final Logo Assets</h1>
<p class="subtitle">"Verified Protection" Concept translated to production-ready SVG</p>

<div class="grid">
  <!-- Light Version -->
  <div class="card bg-white">
    <svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 40 12 L 10 22 V 50 Q 10 85 40 95 Q 70 85 70 50 V 22 L 40 12 Z" fill="#ffffff" stroke="#18181b" stroke-width="8" stroke-linejoin="round"/>
      <path d="M 22 47 L 38 63 L 82 19" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 22 47 L 38 63 L 82 19" stroke="#059669" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 85 33 Q 85 45 97 45 Q 85 45 85 57 Q 85 45 73 45 Q 85 45 85 33 Z" fill="#059669"/>
    </svg>
    <div class="label-group">
      <div class="label">Primary Logo</div>
      <div class="desc">For white / light backgrounds (#ffffff)</div>
    </div>
  </div>

  <!-- Dark Version -->
  <div class="card bg-dark">
    <svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 40 12 L 10 22 V 50 Q 10 85 40 95 Q 70 85 70 50 V 22 L 40 12 Z" fill="#18181b" stroke="#ffffff" stroke-width="8" stroke-linejoin="round"/>
      <path d="M 22 47 L 38 63 L 82 19" stroke="#18181b" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 22 47 L 38 63 L 82 19" stroke="#059669" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 85 33 Q 85 45 97 45 Q 85 45 85 57 Q 85 45 73 45 Q 85 45 85 33 Z" fill="#059669"/>
    </svg>
    <div class="label-group">
      <div class="label">Dark Logo</div>
      <div class="desc">For dark backgrounds (Ink #18181b)</div>
    </div>
  </div>

  <!-- All Green Version -->
  <div class="card bg-green">
    <svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 40 12 L 10 22 V 50 Q 10 85 40 95 Q 70 85 70 50 V 22 L 40 12 Z" fill="#059669" stroke="#ffffff" stroke-width="8" stroke-linejoin="round"/>
      <path d="M 22 47 L 38 63 L 82 19" stroke="#059669" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 22 47 L 38 63 L 82 19" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 85 33 Q 85 45 97 45 Q 85 45 85 57 Q 85 45 73 45 Q 85 45 85 33 Z" fill="#ffffff"/>
    </svg>
    <div class="label-group">
      <div class="label">Monochrome Accent</div>
      <div class="desc">For solid green backgrounds (#059669)</div>
    </div>
  </div>

  <!-- Nav Light Preview -->
  <div class="card bg-white nav-section">
    <div class="label" style="text-align: left;">Navigation Bar Previews</div>
    
    <div class="nav-preview-row">
      <div class="nav-preview nav-light">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 40 12 L 10 22 V 50 Q 10 85 40 95 Q 70 85 70 50 V 22 L 40 12 Z" fill="#ffffff" stroke="#18181b" stroke-width="8" stroke-linejoin="round"/>
          <path d="M 22 47 L 38 63 L 82 19" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 22 47 L 38 63 L 82 19" stroke="#059669" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 85 33 Q 85 45 97 45 Q 85 45 85 57 Q 85 45 73 45 Q 85 45 85 33 Z" fill="#059669"/>
        </svg>
        Cleaning Audit
      </div>

      <div class="nav-preview nav-dark">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 40 12 L 10 22 V 50 Q 10 85 40 95 Q 70 85 70 50 V 22 L 40 12 Z" fill="#18181b" stroke="#ffffff" stroke-width="8" stroke-linejoin="round"/>
          <path d="M 22 47 L 38 63 L 82 19" stroke="#18181b" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 22 47 L 38 63 L 82 19" stroke="#059669" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 85 33 Q 85 45 97 45 Q 85 45 85 57 Q 85 45 73 45 Q 85 45 85 33 Z" fill="#059669"/>
        </svg>
        Cleaning Audit
      </div>
    </div>
  </div>
</div>

</body>
</html>
