<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

/* Favicon preview */
.favicon-section {
  background: #292524;
  padding: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 48px;
}
.favicon-row {
  display: flex;
  align-items: center;
  gap: 40px;
}
.favicon-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.favicon-box span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #78716c;
}

/* Logo lockups */
.logo-section {
  background: #1c1917;
  padding: 120px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 80px;
}

.logo-horizontal {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo-mark {
  flex-shrink: 0;
}
.logo-text {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: #fafaf9;
  line-height: 1;
}
.logo-text-accent {
  color: #d97706;
}

/* OG Image preview */
.og-section {
  width: 1200px;
  height: 630px;
  background: #1c1917;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.og-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    repeating-linear-gradient(90deg, #292524 0px, #292524 1px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg, #292524 0px, #292524 1px, transparent 1px, transparent 60px);
  opacity: 0.3;
}
.og-content {
  position: relative;
  z-index: 1;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}
.og-title {
  font-family: 'Inter', sans-serif;
  font-size: 64px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: #fafaf9;
  line-height: 1.1;
}
.og-title span { color: #d97706; }
.og-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  color: #78716c;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.og-domain {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: #3f3f46;
  position: absolute;
  bottom: 40px;
  right: 48px;
}
/* Accent line at top */
.og-section::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: #d97706;
}

/* Apple touch icon */
.touch-section {
  width: 180px;
  height: 180px;
  background: #1c1917;
  border-radius: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Color palette */
.palette-section {
  background: #292524;
  padding: 80px;
  display: flex;
  gap: 16px;
  justify-content: center;
}
.swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.swatch-color {
  width: 64px;
  height: 64px;
  border-radius: 4px;
  border: 1px solid #3f3f46;
}
.swatch span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #78716c;
}
</style>
</head>
<body>

<!-- Favicon at various sizes -->
<div class="favicon-section">
  <div class="favicon-row">
    <div class="favicon-box">
      <svg width="16" height="16" viewBox="0 0 32 32">
        <rect width="32" height="32" rx="4" fill="#1c1917"/>
        <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>16px</span>
    </div>
    <div class="favicon-box">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <rect width="32" height="32" rx="4" fill="#1c1917"/>
        <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>32px</span>
    </div>
    <div class="favicon-box">
      <svg width="64" height="64" viewBox="0 0 32 32">
        <rect width="32" height="32" rx="4" fill="#1c1917"/>
        <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>64px</span>
    </div>
    <div class="favicon-box">
      <svg width="128" height="128" viewBox="0 0 32 32">
        <rect width="32" height="32" rx="4" fill="#1c1917"/>
        <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>128px</span>
    </div>
  </div>
</div>

<!-- Logo lockups -->
<div class="logo-section">
  <!-- Small -->
  <div class="logo-horizontal">
    <svg class="logo-mark" width="28" height="28" viewBox="0 0 32 32">
      <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text" style="font-size: 18px;">Roofing <span class="logo-text-accent">Audit</span></span>
  </div>

  <!-- Medium -->
  <div class="logo-horizontal">
    <svg class="logo-mark" width="40" height="40" viewBox="0 0 32 32">
      <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text" style="font-size: 28px;">Roofing <span class="logo-text-accent">Audit</span></span>
  </div>

  <!-- Large -->
  <div class="logo-horizontal">
    <svg class="logo-mark" width="56" height="56" viewBox="0 0 32 32">
      <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text" style="font-size: 42px;">Roofing <span class="logo-text-accent">Audit</span></span>
  </div>
</div>

<!-- OG Image -->
<div class="og-section">
  <div class="og-content">
    <svg width="72" height="72" viewBox="0 0 32 32">
      <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="og-title">Roofing <span>Audit</span></div>
    <div class="og-subtitle">Your website is leaking trust, leads, and local authority</div>
  </div>
  <div class="og-domain">roofingaudit.co</div>
</div>

<!-- Apple Touch Icon -->
<div style="background: #292524; padding: 80px; display: flex; justify-content: center;">
  <div class="touch-section">
    <svg width="80" height="80" viewBox="0 0 32 32">
      <path d="M4 24 L14 7 L28 24" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<!-- Color Palette -->
<div class="palette-section">
  <div class="swatch"><div class="swatch-color" style="background:#1c1917"></div><span>#1c1917</span><span>Slate</span></div>
  <div class="swatch"><div class="swatch-color" style="background:#292524"></div><span>#292524</span><span>Surface</span></div>
  <div class="swatch"><div class="swatch-color" style="background:#3f3f46"></div><span>#3f3f46</span><span>Border</span></div>
  <div class="swatch"><div class="swatch-color" style="background:#d97706"></div><span>#d97706</span><span>Copper</span></div>
  <div class="swatch"><div class="swatch-color" style="background:#b45309"></div><span>#b45309</span><span>Amber</span></div>
  <div class="swatch"><div class="swatch-color" style="background:#3b82f6"></div><span>#3b82f6</span><span>Storm</span></div>
  <div class="swatch"><div class="swatch-color" style="background:#fafaf9"></div><span>#fafaf9</span><span>Ink</span></div>
  <div class="swatch"><div class="swatch-color" style="background:#78716c"></div><span>#78716c</span><span>Faint</span></div>
</div>

</body>
</html>
